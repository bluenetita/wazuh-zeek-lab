# Kali network configuration - sanitized
# This file documents the network configuration used by AttackerVM.
# It is not intended to be applied automatically without review.

VM_NAME="AttackerVM"
HOSTNAME="attackervm"
OS="Kali Linux"
ROLE="Red team attacker machine"

# Proxmox network placement
PROXMOX_BRIDGE="vmbr1"
NETWORK_SEGMENT="external-simulated-network"

# Network interfaces
INTERFACE_PRIMARY="eth0"
INTERFACE_SECONDARY="eth1"

# IP configuration
ETH0_ADDRESS="10.2.0.2/24"
ETH1_ADDRESS="10.2.0.3/24"
NETWORK="10.2.0.0/24"
GATEWAY="10.2.0.1"

# Routing
DEFAULT_ROUTE_PRIMARY="default via 10.2.0.1 dev eth0 metric 100"
DEFAULT_ROUTE_SECONDARY="default via 10.2.0.1 dev eth1 metric 101"

# DNS
DNS_SERVERS="8.8.8.8,1.1.1.1"

# NetworkManager connections
ETH0_CONNECTION="Wired connection 1"
ETH1_CONNECTION="Connessione Ethernet 1"

# Main target used in the documented scenarios
TARGET_HOST="Client Linux / ClientVM"
TARGET_NETWORK="VLAN 20 - Client"

# Traffic path:
# AttackerVM -> vmbr1 -> pfSense -> RouterOS -> VLAN Client -> Client Linux

# Useful verification commands:
# ip -br addr
# ip route
# cat /etc/resolv.conf
# nmcli device status
# nmcli connection show --active
# ping <TARGET_IP>
# traceroute <TARGET_IP>